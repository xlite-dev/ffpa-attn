# ffpa-attn pre-commit configuration.
#
# 2-space indentation is used uniformly for both Python (yapf, configured in
# setup.cfg) and C/C++/CUDA (clang-format, configured in the root .clang-format).
#
# Files under csrc/cuffpa/generated/ are auto-generated by
#   env.py :: ENV.generate_split_headdim_sources()
# and checked in as a long-lived build artifact. They must NOT be touched by
# any formatter or whitespace hook, otherwise the generator will overwrite
# formatter edits on the next build and create spurious diffs. The global
# `exclude` regex below skips the whole generated/ subtree for every hook,
# and there is a matching `.clang-format` inside generated/ with
# `DisableFormat: true` as a belt-and-braces safeguard.
exclude: |
  (?x)^(
    csrc/cuffpa/generated/.*
    | build/.*
    | dist/.*
    | ffpa_attn\.egg-info/.*
    | \.tmp/.*
    | ffpa_attn/_version\.py
  )$

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
        args:
          - --allow-multiple-documents
      - id: check-toml
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/PyCQA/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        args: [--config=setup.cfg]

  - repo: local
    hooks:
      - id: yapf
        name: yapf
        entry: yapf
        language: python
        types: [python]
        additional_dependencies:
          - yapf==0.40.2
        args:
          - --in-place
          - --parallel

      - id: clang-format
        name: clang-format
        entry: clang-format
        language: python
        types_or: [c, c++, cuda]
        additional_dependencies:
          - clang-format==18.1.8
        args:
          - -i
          - --style=file
