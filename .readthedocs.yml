# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  jobs:
    post_checkout:
      # setuptools-scm needs full git history to derive the version from tags.
      - git fetch --unshallow || true
    install:
      # Install CPU-only PyTorch first so mkdocstrings can import ffpa_attn
      # to extract docstrings from ``ffpa_attn.ffpa_attn_func``.
      - pip install torch --index-url https://download.pytorch.org/whl/cpu
      # Skip building the CUDA C++ extension on the RTD runner (no nvcc); the
      # FFPA_SKIP_CUDA_EXT=1 flag tells setup.py to install only the Python
      # wrapper, which is sufficient for mkdocstrings.
      - FFPA_SKIP_CUDA_EXT=1 pip install ".[docs]"

mkdocs:
  configuration: mkdocs.yml
  fail_on_warning: true
